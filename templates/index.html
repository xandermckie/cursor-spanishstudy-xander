<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Estudio Personal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0d0b;
      --accent: #c8a96e;
      --text: #e8e0d0;
      --border: #3a3530;
    }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar { background: #1a1814 !important; border-bottom: 1px solid var(--border); }
    .navbar-brand, .nav-link { color: var(--text) !important; }
    .nav-link:hover, .nav-link.active { color: var(--accent) !important; }
    main { flex: 1; }
    .placeholder-card {
      background: #1a1814;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
    }
    footer {
      border-top: 1px solid var(--border);
      color: #9a9080;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('home') }}">Estudio Personal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
              aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link{% if page == 'home' %} active{% endif %}" href="{{ url_for('home') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if page == 'reader' %} active{% endif %}" href="{{ url_for('reader') }}">Reader</a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if page == 'vocab' %} active{% endif %}" href="{{ url_for('vocab') }}">Vocab</a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if page == 'quiz' %} active{% endif %}" href="{{ url_for('quiz') }}">Quiz</a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if page == 'phrasebook' %} active{% endif %}" href="{{ url_for('phrasebook') }}">Phrasebook</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('refresh') }}">Refresh</a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if page == 'export' %} active{% endif %}" href="{{ url_for('export') }}">Export</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="h3 mb-4" style="color: var(--accent);">{{ title }}</h1>
    <div class="placeholder-card p-4">
      <p class="mb-0">{{ message }}</p>
    </div>
    {% block content %}{% endblock %}
  </main>

  <footer class="container py-3 text-center">
    Estudio Personal — Barcelona language study
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
