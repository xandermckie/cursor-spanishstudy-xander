{# Pez pixel mascot — see notes/pez-pixel-spec.md #}
{% macro pez(size=80, expression='happy', speech=None, animated=false, flip=false) %}
<div class="pez-wrapper{% if animated %} pez-animated{% endif %}{% if flip %} pez-flip{% endif %}"{% if animated %} style="display:inline-flex"{% endif %}>
  {% if speech %}
  <div class="pez-speech">{{ speech }}</div>
  {% endif %}
  <svg width="{{ size }}" height="{{ size }}" viewBox="0 0 80 80" shape-rendering="crispEdges" aria-label="Pez mascot" class="pez-svg">
    {% include "partials/pez_body_pixels.html" %}
    {% if expression == 'wink' %}
    {% include "partials/pez_eye_wink_pixels.html" %}
    {% elif expression == 'sleeping' %}
    {% include "partials/pez_eye_sleep_pixels.html" %}
    {% elif expression == 'celebrating' %}
    {% include "partials/pez_eye_wide_pixels.html" %}
    {% elif expression == 'thinking' %}
    {% include "partials/pez_eye_small_pixels.html" %}
    {% else %}
    {% include "partials/pez_eye_happy_pixels.html" %}
    {% endif %}
    {% if expression == 'thinking' %}
    {% include "partials/pez_mouth_flat_pixels.html" %}
    {% elif expression == 'sleeping' %}
    {% include "partials/pez_mouth_tiny_pixels.html" %}
    {% elif expression in ('celebrating', 'excited') %}
    {% include "partials/pez_mouth_wide_pixels.html" %}
    {% else %}
    {% include "partials/pez_mouth_happy_pixels.html" %}
    {% endif %}
    {% if expression in ('happy', 'wink', 'sleeping', 'celebrating', 'excited') %}
    {% include "partials/pez_blush_pixels.html" %}
    {% endif %}
  </svg>
</div>
{% endmacro %}
