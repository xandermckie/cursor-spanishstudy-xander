<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ title }}{% endblock %} — Estudio Personal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0d0b;
      --surface: #16140f;
      --surface2: #1e1c15;
      --accent: #c8a96e;
      --accent2: #7eb8a0;
      --text: #e8e0d0;
      --text-dim: #8a7f6e;
      --border: #3a3530;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar { background: var(--surface) !important; border-bottom: 1px solid var(--border); }
    .navbar-brand, .nav-link { color: var(--text) !important; }
    .nav-link:hover, .nav-link.active { color: var(--accent) !important; }
    main { flex: 1; }
    .card-panel {
      background: var(--surface);
      border: 1px solid rgba(200, 169, 110, 0.15);
      border-radius: 0.75rem;
      margin-bottom: 1rem;
    }
    .card-panel .card-header {
      background: transparent;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    footer {
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .badge-cat { background: var(--accent2); color: var(--bg); }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('home') }}" style="font-family: 'Playfair Display', serif;">Estudio Personal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
              aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link{% if page == 'home' %} active{% endif %}" href="{{ url_for('home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link{% if page == 'reader' %} active{% endif %}" href="{{ url_for('reader') }}">Reader</a></li>
          <li class="nav-item"><a class="nav-link{% if page == 'vocab' %} active{% endif %}" href="{{ url_for('vocab') }}">Vocab</a></li>
          <li class="nav-item"><a class="nav-link{% if page == 'quiz' %} active{% endif %}" href="{{ url_for('quiz') }}">Quiz</a></li>
          <li class="nav-item"><a class="nav-link{% if page == 'phrasebook' %} active{% endif %}" href="{{ url_for('phrasebook') }}">Phrasebook</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('refresh') }}">Refresh</a></li>
          <li class="nav-item"><a class="nav-link{% if page == 'export' %} active{% endif %}" href="{{ url_for('export') }}">Export</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="{% block main_class %}container py-5{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <footer class="container py-3 text-center">
    Estudio Personal — Barcelona language study
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
