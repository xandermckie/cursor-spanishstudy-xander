services:
  - type: web
    name: cursor-spanishstudy-xander
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: MYMEMORY_URL
        value: https://api.mymemory.translated.net/get
      - key: DICTIONARY_API_BASE
        value: https://api.dictionaryapi.dev/api/v2/entries/en
      - key: REFRESH_INTERVAL_MINUTES
        value: "15"
