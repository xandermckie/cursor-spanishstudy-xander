# Optional Blueprint — matches Render dashboard defaults.
# If you configure the service manually, leave Start Command empty to use Procfile.
services:
  - type: web
    name: cursor-spanishstudy-xander
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SCHEDULER_ENABLED
        value: "true"
